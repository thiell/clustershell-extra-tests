name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Daily canary against ClusterShell master.
    - cron: '17 6 * * *'
  workflow_dispatch:

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }}, ClusterShell ${{ matrix.clustershell }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ClusterShell PyPI 1.9.3 predates the #594 / PEP 706 work the
        # tests pin, so the default install path is upstream master.
        # When ClusterShell 1.9.4 (or later) ships with #594, add a
        # 'pypi' entry to this matrix.
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
        clustershell: [master]
        include:
          # Canary: latest Python against thiell's PEP 706 branch
          # (lets tests/tree/test_extractall_filter.py actually execute
          # until the PEP 706 fix lands upstream).
          - python-version: '3.13'
            clustershell: thiell-pep706
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          case "${{ matrix.clustershell }}" in
            master)
              pip install "ClusterShell @ git+https://github.com/clustershell/clustershell.git@master"
              ;;
            thiell-pep706)
              pip install "ClusterShell @ git+https://github.com/thiell/clustershell.git@fix/tree-extractall-pep706"
              ;;
            pypi)
              pip install "ClusterShell>=1.9"
              ;;
          esac
          pip install pytest pytest-cov coverage

      - name: Show ClusterShell version
        run: python -c "import ClusterShell; print(ClusterShell.__version__)"

      - name: Run pytest with coverage
        run: pytest --cov=ClusterShell.Worker.Tree --cov-report=term-missing

  combined:
    name: combined coverage (upstream TreeWorkerTest + this repo)
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo
        uses: actions/checkout@v4
        with:
          path: extra-tests

      - name: Check out clustershell at master
        uses: actions/checkout@v4
        with:
          repository: clustershell/clustershell
          ref: master
          path: clustershell

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install ClusterShell from the checkout + test deps
        run: |
          python -m pip install --upgrade pip
          pip install ./clustershell
          pip install pytest pytest-cov coverage

      # Mirror upstream's CI SSH setup so TreeWorkerTest.py's
      # _direct / _foreign / _gateway tests can drive workers via real
      # SSH to localhost / 127.0.0.2. Source: clustershell's own
      # .github/workflows/nosetests.yml.
      - name: Allow passwordless SSH to localhost
        run: |
          set -euxo pipefail
          chmod og-rw ~
          ssh-keygen -f ~/.ssh/id_rsa -N ""
          cp ~/.ssh/{id_rsa.pub,authorized_keys}

      - name: Avoid ssh "known hosts" warnings
        run: |
          set -euxo pipefail
          printf '%s\n    %s\n    %s\n' 'Host *' 'StrictHostKeyChecking no' 'LogLevel ERROR' >> ~/.ssh/config

      - name: Set Python paths when sshing for gateway tests
        run: |
          set -euxo pipefail
          PYTHON_SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          sed -i "1iexport CLUSTERSHELL_GW_PYTHON_EXECUTABLE=$(which python)" ~/.bashrc
          sed -i "2iexport PYTHONPATH=\$PYTHONPATH:$PYTHON_SITE_PACKAGES" ~/.bashrc
          head -3 ~/.bashrc
          ssh 127.0.0.2 'python -c "import ClusterShell; print(ClusterShell.__file__)"'

      - name: Add clustershell/tests/bin to remote PATH
        run: |
          set -euxo pipefail
          sed -i "1iexport PATH=$GITHUB_WORKSPACE/clustershell/tests/bin:\$PATH" ~/.bashrc
          head -1 ~/.bashrc
          ssh 127.0.0.2 which hostname
          ssh 127.0.0.2 hostname

      # parallel-mode writes .coverage.<host>.<pid>.<rand> so the two
      # runs don't clobber each other before `coverage combine`.

      - name: Run upstream TreeWorkerTest.py under coverage
        working-directory: clustershell
        run: |
          set -euxo pipefail
          export CLUSTERSHELL_GW_PYTHON_EXECUTABLE=$(which python)
          coverage run --parallel-mode --branch \
            --source=ClusterShell.Worker.Tree \
            -m unittest discover -v -s tests -p 'TreeWorkerTest.py' -t .

      - name: Run this repo's tests under coverage
        working-directory: extra-tests
        run: |
          set -euxo pipefail
          coverage run --parallel-mode --branch \
            --source=ClusterShell.Worker.Tree \
            -m pytest

      - name: Combine and report coverage
        working-directory: extra-tests
        run: |
          set -euxo pipefail
          # Pull in upstream's .coverage.* shards alongside our own.
          cp ../clustershell/.coverage.* .
          coverage combine
          coverage report -m
          coverage xml -o coverage.xml

      - name: Enforce 100% combined coverage on Tree.py
        working-directory: extra-tests
        run: coverage report --fail-under=100

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage
          path: extra-tests/coverage.xml
